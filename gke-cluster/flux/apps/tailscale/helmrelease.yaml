apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: tailscale-operator
    namespace: flux-system
spec:
    interval: 30m
    chart:
        spec:
            chart: tailscale-operator
            version: "1.98.9"
            sourceRef:
                kind: HelmRepository
                name: tailscale
                namespace: flux-system
            interval: 12h
    valuesFrom:
        - kind: Secret
          name: tailscale-credentials
          targetPath: oauth.clientId
          valuesKey: clientId
        - kind: Secret
          name: tailscale-credentials
          targetPath: oauth.clientSecret
          valuesKey: clientSecret
    targetNamespace: tailscale-operator
    install:
        createNamespace: true
