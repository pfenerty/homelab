apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: podinfo
    namespace: flux-system
spec:
    interval: 30m
    chart:
        spec:
            chart: podinfo
            sourceRef:
                kind: HelmRepository
                name: podinfo
            version: 6.11.1
    values:
        replicaCount: 2
        resources:
            limits:
                memory: 256Mi
            requests:
                cpu: 100m
                memory: 64Mi
    targetNamespace: podinfo
