apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
    - chains.yaml
patches:
    # Configure chains-config (defaults are commented out in the release manifest).
    # SLSA v1.0 provenance (slsa/v2alpha4), stored as annotations on the Runs
    # (tekton storage), signed with the x509 cosign key in `signing-secrets`, and
    # uploaded to the public Rekor transparency log. OCI storage is disabled — no
    # registry push credentials are configured for Chains.
    - patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: chains-config
            namespace: tekton-chains
          data:
            artifacts.taskrun.format: "slsa/v2alpha4"
            artifacts.taskrun.storage: "tekton"
            artifacts.taskrun.signer: "x509"
            artifacts.pipelinerun.format: "slsa/v2alpha4"
            artifacts.pipelinerun.storage: "tekton"
            artifacts.pipelinerun.signer: "x509"
            artifacts.pipelinerun.enable-deep-inspection: "true"
            artifacts.oci.storage: ""
            transparency.enabled: "true"
            transparency.url: "https://rekor.sigstore.dev"
