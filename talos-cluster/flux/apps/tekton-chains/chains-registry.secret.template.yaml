# Template only — the real secret is created out of band and SOPS-encrypted.
# To give the chains controller ghcr push creds for OCI storage:
#
#   kubectl create secret docker-registry chains-registry -n tekton-chains \
#     --docker-server=ghcr.io --docker-username=pfenerty \
#     --docker-password=<GHCR_WRITE_TOKEN> \
#     --dry-run=client -o yaml > chains-registry.secret.enc.yaml
#   sops -e -i chains-registry.secret.enc.yaml
#
# then uncomment `- chains-registry.secret.enc.yaml` in kustomization.yaml and push.
# The ServiceAccount imagePullSecret is already wired in kustomization.yaml.
apiVersion: v1
kind: Secret
metadata:
    name: chains-registry
    namespace: tekton-chains
type: kubernetes.io/dockerconfigjson
stringData:
    .dockerconfigjson: |
        {
          "auths": {
            "ghcr.io": {
              "username": "pfenerty",
              "password": "REPLACE_WITH_GHCR_WRITE_TOKEN",
              "auth": "REPLACE_WITH_BASE64_pfenerty_colon_TOKEN"
            }
          }
        }
