apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: trek
      sourceRef:
        kind: HelmRepository
        name: trek
      version: 3.0.22
  values:
    ingress:
      enabled: true
      className: tailscale
      hosts:
        - host: trek
          path: /
      tls:
        - hosts:
            - trek
  targetNamespace: trek
