apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-trivy-scan
  namespace: tektonic-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  steps:
    - command:
        - trivy
        - fs
        - --format
        - sarif
        - --output
        - $(workspaces.workspace.path)/trivy.sarif
        - "."
      image: aquasec/trivy:latest
      name: scan
      workingDir: $(workspaces.workspace.path)
    - args:
        - |-
          set -e
          SARIF=$(gzip -c trivy.sarif | base64 -w0)
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -d "{\"commit_sha\":\"$(params.revision)\",\"ref\":\"refs/heads/main\",\"sarif\":\"$SARIF\"}"   "https://api.github.com/repos/$(params.repo-full-name)/code-scanning/sarifs"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: upload-sarif
      workingDir: $(workspaces.workspace.path)
  workspaces:
    - name: workspace
