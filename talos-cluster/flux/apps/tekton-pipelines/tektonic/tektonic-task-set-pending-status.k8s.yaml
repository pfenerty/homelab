apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-set-pending-status
  namespace: tektonic-ci
spec:
  params:
    - name: revision
      type: string
    - name: repo-full-name
      type: string
  stepTemplate:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  steps:
    - args:
        - "curl -fsS -X POST   -H \"Authorization: token $GITHUB_TOKEN\"   -H \"Accept: application/vnd.github+json\"   -d '{\"state\":\"pending\",\"context\":\"tektonic-ci\",\"description\":\"Pipeline running\"}'   \"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)\""
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: set-pending
