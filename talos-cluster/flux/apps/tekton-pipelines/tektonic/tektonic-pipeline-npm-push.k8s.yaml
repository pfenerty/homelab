apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: tektonic-npm-push
  namespace: tektonic-ci
spec:
  finally:
    - name: set-final-status
      params:
        - name: revision
          value: $(params.revision)
        - name: repo-full-name
          value: $(params.repo-full-name)
      taskRef:
        kind: Task
        name: tektonic-set-final-status
  params:
    - name: project-name
      type: string
    - name: repo-full-name
      type: string
    - default: ./
      name: build-path
      type: string
    - name: url
      type: string
    - name: revision
      type: string
    - name: repo-full-name
      type: string
  tasks:
    - name: set-pending-status
      params:
        - name: revision
          value: $(params.revision)
        - name: repo-full-name
          value: $(params.repo-full-name)
      taskRef:
        kind: Task
        name: tektonic-set-pending-status
    - name: git-clone
      params:
        - name: url
          value: $(params.url)
        - name: revision
          value: $(params.revision)
      runAfter:
        - set-pending-status
      taskRef:
        kind: Task
        name: tektonic-git-clone
      workspaces:
        - name: workspace
          workspace: workspace
    - name: test-npm
      params:
        - name: build-path
          value: $(params.build-path)
      runAfter:
        - git-clone
      taskRef:
        kind: Task
        name: tektonic-test-npm
      workspaces:
        - name: workspace
          workspace: workspace
    - name: trivy-scan
      params:
        - name: repo-full-name
          value: $(params.repo-full-name)
        - name: revision
          value: $(params.revision)
      runAfter:
        - git-clone
      taskRef:
        kind: Task
        name: tektonic-trivy-scan
      workspaces:
        - name: workspace
          workspace: workspace
  workspaces:
    - name: workspace
