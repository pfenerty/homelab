apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-test-npm
  namespace: tektonic-ci
spec:
  params:
    - default: ./
      name: build-path
      type: string
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  steps:
    - args:
        - npm ci && npm test; EC=$?; echo $EC > /tekton/home/.exit-code; exit $EC
      command:
        - sh
        - -c
      image: node:22-alpine
      name: test
      onError: continue
      workingDir: $(workspaces.workspace.path)/$(params.build-path)
    - args:
        - |-
          EXIT_CODE=$(cat /tekton/home/.exit-code)
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success DESC=Passed; else STATE=failure DESC=Failed; fi
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -H "Content-Type: application/json"   -d "{\"state\":\"$STATE\",\"context\":\"tektonic-ci/test\",\"description\":\"$DESC\"}"   "https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/curl:latest-dev
      name: report-status
  workspaces:
    - name: workspace
