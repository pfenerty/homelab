apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-set-final-status
  namespace: tektonic-ci
spec:
  params:
    - name: revision
      type: string
    - name: repo-full-name
      type: string
  stepTemplate:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  steps:
    - env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: cgr.dev/chainguard/gh:latest
      name: set-status
      script: |-
        #!/bin/sh
        set -e
        if [ "$(tasks.status)" = "Succeeded" ]; then
          STATE=success DESC="Pipeline succeeded"
        else
          STATE=failure DESC="Pipeline failed"
        fi
        gh api "repos/$(params.repo-full-name)/statuses/$(params.revision)"   -f state="$STATE" -f context=tektonic-ci -f description="$DESC"
