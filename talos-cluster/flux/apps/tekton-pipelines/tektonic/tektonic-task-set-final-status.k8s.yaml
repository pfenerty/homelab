apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-set-final-status
  namespace: tektonic-ci
spec:
  params:
    - name: revision
      type: string
    - name: repo-full-name
      type: string
  stepTemplate:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  steps:
    - args:
        - |-
          set -e
          if [ "$(tasks.status)" = "Succeeded" ]; then
            STATE=success DESC="Pipeline succeeded"
          else
            STATE=failure DESC="Pipeline failed"
          fi
          curl -fsS -X POST   -H "Authorization: token $GITHUB_TOKEN"   -H "Accept: application/vnd.github+json"   -d "{\"state\":\"$STATE\",\"context\":\"tektonic-ci\",\"description\":\"$DESC\"}"   "https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
      command:
        - sh
        - -c
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: alpine:3
      name: set-status
