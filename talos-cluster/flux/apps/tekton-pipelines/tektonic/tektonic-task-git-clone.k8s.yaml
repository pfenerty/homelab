apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-git-clone
  namespace: tektonic-ci
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  steps:
    - image: cgr.dev/chainguard/git:latest
      name: clone
      script: |-
        #!/bin/sh
        set -e
        git clone $(params.url) .
        git config --global --add safe.directory $(workspaces.workspace.path)
        git checkout $(params.revision)
  workspaces:
    - name: workspace
