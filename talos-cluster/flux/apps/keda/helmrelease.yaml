apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: keda
      version: "2.19.0"
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
      interval: 12h
  targetNamespace: keda
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    prometheus:
      operator:
        enabled: true
        port: 8080
      metricServer:
        enabled: true
        port: 9022
      webhooks:
        enabled: true
        port: 8080
    # Modest resource asks — the KEDA controller is light at this scale.
    operator:
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 200m
          memory: 256Mi
    metricsServer:
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 200m
          memory: 256Mi
    webhooks:
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
