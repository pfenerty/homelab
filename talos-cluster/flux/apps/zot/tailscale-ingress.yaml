apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: zot
    namespace: zot
    annotations:
        tailscale.com/funnel: "true"
spec:
    ingressClassName: tailscale
    rules:
        - http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: zot
                            port:
                                number: 5000
    tls:
        - hosts:
              - zot
