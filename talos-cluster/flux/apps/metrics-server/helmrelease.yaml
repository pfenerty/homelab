apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: metrics-server
    namespace: flux-system
spec:
    interval: 30m
    chart:
        spec:
            chart: metrics-server
            version: "3.13.1"
            sourceRef:
                kind: HelmRepository
                name: metrics-server
                namespace: flux-system
            interval: 12h
    targetNamespace: kube-system
    values:
        # Kubelet serves a self-signed cert without IP SANs (Talos default
        # now that rotate-server-certificates is off). Skip verification —
        # kube-apiserver does the same.
        args:
            - --kubelet-insecure-tls
