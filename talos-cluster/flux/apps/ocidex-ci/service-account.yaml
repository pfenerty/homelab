apiVersion: v1
kind: ServiceAccount
metadata:
    name: default
    namespace: ocidex-ci
# Tekton Chains authenticates to the registry as the TaskRun's ServiceAccount
# (not the chains controller's). Linking ghcr-docker-config here lets Chains push
# signatures/attestations to ghcr for OCI storage. `secrets` is what Chains reads;
# imagePullSecrets is kept for parity with apko-cicd.
secrets:
    - name: ghcr-docker-config
imagePullSecrets:
    - name: ghcr-docker-config
