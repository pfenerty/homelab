---
# CloudNativePG-managed Postgres for ocidex. Replaces the StatefulSet that
# used to live in the ocidex repo's k8s/base/postgres-statefulset.yaml.
# - Auto-tuned (shared_buffers, work_mem, etc.) from declared resources.
# - Continuous WAL archival is OFF in this single-node deployment; flip on
#   .spec.backup once a backup target (MinIO/S3/NFS) is provisioned.
# - Single instance until a second worker node justifies a replica.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
    name: ocidex-pg
    namespace: ocidex
spec:
    # Pin a 15.x image to stay aligned with the StatefulSet we're replacing
    # (postgres:15.4-alpine). CNPG manages major-version upgrades when bumped.
    imageName: ghcr.io/cloudnative-pg/postgresql:15.13

    instances: 1

    storage:
        size: 10Gi
        storageClass: local-path

    resources:
        requests:
            cpu: "500m"
            memory: "1Gi"
        limits:
            cpu: "1500m"
            memory: "3Gi"

    # Auto-derive tuning from the declared resources. CNPG sets shared_buffers,
    # effective_cache_size, work_mem, max_connections, etc. We can override
    # specific params via .spec.postgresql.parameters when needed.
    postgresql:
        parameters:
            # Wins on a single-tenant Postgres dedicated to a write-heavy
            # workload. Defaults from auto-tuning are otherwise kept.
            wal_compression: "on"
            random_page_cost: "1.1"

    monitoring:
        enablePodMonitor: true

    bootstrap:
        initdb:
            database: ocidex
            owner: ocidex
            secret:
                name: ocidex-pg-app
