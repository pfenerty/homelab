---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: ocidex
    namespace: flux-system
spec:
    interval: 10m
    releaseName: ocidex
    targetNamespace: ocidex
    upgrade:
        # ScaledObjects never become Ready while keda.enabled=false + broken
        # NATS trigger; disable wait until chart fix gates them properly.
        disableWait: true
        remediation:
            retries: -1
    chart:
        spec:
            chart: ocidex
            # prod tracks the latest STABLE semver release only (no prereleases).
            # ">=0.0.0" excludes prerelease versions like the 0.1.0-<sha> main builds.
            version: ">=0.0.0"
            sourceRef:
                kind: HelmRepository
                name: ocidex
                namespace: flux-system
    values:
        # No image.tag override: the tag resolves to the chart's appVersion (vX.Y.Z),
        # so prod runs the released semver image, not the rolling :main tag.
        image:
            pullPolicy: IfNotPresent
        existingSecret: ocidex-secrets
        nats:
            storage:
                storageClass: local-path
        gatewayApi:
            enabled: false
        keda:
            enabled: false
        monitoring:
            enabled: true
        scannerWorker:
            resources:
                requests:
                    cpu: "50m"
                    memory: "128Mi"
        api:
            env:
                environment: production
                frontendUrl: "https://ocidex.app"
                githubRedirectUrl: "https://ocidex.app/auth/callback"
                corsAllowedOrigins: "https://ocidex.app"
