---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: ocidex-operator
    namespace: flux-system
spec:
    interval: 10m
    releaseName: ocidex-operator
    targetNamespace: ocidex-operator
    install:
        crds: CreateReplace
    upgrade:
        crds: CreateReplace
    chart:
        spec:
            chart: ocidex-operator
            version: ">=0.0.0-0"
            sourceRef:
                kind: HelmRepository
                name: ocidex
                namespace: flux-system
    values:
        image:
            repository: ghcr.io/pfenerty/ocidex-operator
            tag: main
        server:
            url: "http://ocidex-api.ocidex.svc.cluster.local:8080"
        apiKey:
            secretName: ocidex-operator-secrets
            secretKey: OCIDEX_API_KEY
        leaderElect: true
