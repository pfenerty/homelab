---
apiVersion: ocidex.io/v1alpha1
kind: OCIRegistry
metadata:
    name: quay-container-tools
    namespace: ocidex-dev
spec:
    name: "Quay.io — Container Tools (Red Hat)"
    type: generic
    url: quay.io
    visibility: public
    repositories:
        - containers/buildah
        - containers/podman
        - containers/skopeo
    tagPatterns:
        - semver
    scanMode: poll
    pollIntervalMinutes: 360
