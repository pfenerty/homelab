---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
    name: ocidex-pg
    namespace: ocidex-dev
spec:
    imageName: ghcr.io/cloudnative-pg/postgresql:15.13
    instances: 1
    storage:
        size: 5Gi
        storageClass: local-path
    resources:
        requests:
            cpu: "250m"
            memory: "512Mi"
        limits:
            cpu: "1000m"
            memory: "2Gi"
    postgresql:
        parameters:
            wal_compression: "on"
            random_page_cost: "1.1"
    bootstrap:
        initdb:
            database: ocidex
            owner: ocidex
            secret:
                name: ocidex-pg-app
