---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: ocidex-dev
    namespace: flux-system
spec:
    interval: 5m
    releaseName: ocidex-dev
    targetNamespace: ocidex-dev
    install:
        timeout: 10m
        remediation:
            retries: -1
    chart:
        spec:
            chart: ocidex
            version: ">=0.0.0-0"
            sourceRef:
                kind: HelmRepository
                name: ocidex
                namespace: flux-system
    values:
        image:
            tag: main
            pullPolicy: Always
        existingSecret: ocidex-secrets
        nats:
            storage:
                storageClass: local-path
        gatewayApi:
            enabled: false
        keda:
            enabled: false
        monitoring:
            enabled: false
        api:
            env:
                environment: development
                frontendUrl: "https://dev.ocidex.app"
                githubRedirectUrl: "https://dev.ocidex.app/auth/callback"
                corsAllowedOrigins: "https://dev.ocidex.app"
        enrichmentWorker:
            replicas: 1
