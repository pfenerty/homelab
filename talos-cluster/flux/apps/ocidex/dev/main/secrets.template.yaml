# TEMPLATE — do not commit this file populated.
# Encrypt to secrets.enc.yaml with:
#
#   cd talos-cluster/flux/apps/ocidex/dev
#   cp secrets.template.yaml secrets.enc.yaml
#   # Fill in values, then:
#   SOPS_AGE_KEY_FILE=../../../../../age.key sops -e -i secrets.enc.yaml
#
# GitHub OAuth: register a separate app (or reuse prod app) with callback
#   https://ocidex.app/auth/callback
# DATABASE_URL: points to the CloudNativePG read-write service in ocidex-dev.
apiVersion: v1
kind: Secret
metadata:
    name: ocidex-secrets
    namespace: ocidex-dev
stringData:
    GITHUB_CLIENT_ID: <github_client_id>
    GITHUB_CLIENT_SECRET: <github_client_secret>
    SESSION_SECRET: <session_secret>
    POSTGRES_USER: ocidex
    POSTGRES_PASSWORD: <postgres_password>
    POSTGRES_DB: ocidex
    DATABASE_URL: "host=ocidex-pg-rw port=5432 dbname=ocidex user=ocidex password=<postgres_password> sslmode=disable"
