# TEMPLATE — do not commit this file populated.
#
# Generate the encrypted secret with:
#
#   cd talos-cluster/flux/apps/ocidex
#   PW=$(SOPS_AGE_KEY_FILE=../../../../age.key \
#        sops -d --extract '["stringData"]["POSTGRES_PASSWORD"]' secrets.enc.yaml)
#   sed "s|<PLACEHOLDER>|$PW|" postgres-app-secret.template.yaml \
#     > postgres-app-secret.enc.yaml
#   SOPS_AGE_KEY_FILE=../../../../age.key \
#     sops -e -i postgres-app-secret.enc.yaml
#   unset PW
#
# CNPG's initdb.secret expects exactly these two keys (username, password) —
# they are not configurable. The password MUST match the legacy
# ocidex-secrets.POSTGRES_PASSWORD so the apps' existing DATABASE_URL
# continues to work after the host switch.
apiVersion: v1
kind: Secret
metadata:
    name: ocidex-pg-app
    namespace: ocidex
stringData:
    username: ocidex
    password: <PLACEHOLDER>
