apiVersion: v1
kind: Secret
metadata:
    name: ocidex-secrets
    namespace: ocidex
stringData:
    GITHUB_CLIENT_ID: <github_client_id>
    GITHUB_CLIENT_SECRET: <github_client_secret>
    SESSION_SECRET: <session_secret>
    POSTGRES_USER: ocidex
    POSTGRES_PASSWORD: <postgres_password>
    POSTGRES_DB: ocidex
    # Use libpq key-value format — URL format breaks when the password contains
    # special characters (/, @, ?, #). The password here must match POSTGRES_PASSWORD.
    DATABASE_URL: "host=postgres port=5432 dbname=ocidex user=ocidex password=<postgres_password> sslmode=disable"
