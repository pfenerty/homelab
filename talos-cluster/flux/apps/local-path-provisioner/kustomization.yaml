apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
    - https://github.com/rancher/local-path-provisioner/releases/download/v0.0.35/local-path-storage.yaml
patches:
    # Talos: use /var (only writable path) instead of /opt
    - target:
          kind: ConfigMap
          name: local-path-config
      patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
              name: local-path-config
              namespace: local-path-storage
          data:
              config.json: |-
                  {
                    "nodePathMap": [
                      {
                        "node": "DEFAULT",
                        "paths": ["/var/local-path-provisioner"]
                      }
                    ]
                  }
    # Set as the cluster default StorageClass
    - target:
          kind: StorageClass
          name: local-path
      patch: |-
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
              name: local-path
              annotations:
                  storageclass.kubernetes.io/is-default-class: "true"
