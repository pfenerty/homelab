apiVersion: v1
kind: ServiceAccount
metadata:
    name: default
    namespace: apko-cicd-ci
# `secrets` is what Tekton Chains reads to authenticate as this (the TaskRun's)
# ServiceAccount when pushing signatures/attestations to ghcr for OCI storage.
secrets:
    - name: ghcr-docker-config
imagePullSecrets:
    - name: ghcr-docker-config
