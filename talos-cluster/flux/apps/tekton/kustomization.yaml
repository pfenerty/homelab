apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
    - dashboard.yaml
    - pipelines.yaml
    - triggers.yaml
    - interceptors.yaml
    - tailscale-ingress.yaml
patches:
    - patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: feature-flags
            namespace: tekton-pipelines
          data:
            set-security-context: "true"
            disable-affinity-assistant: "true"
