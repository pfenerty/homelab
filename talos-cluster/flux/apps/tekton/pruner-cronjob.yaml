apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-pruner
  namespace: tekton-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-pruner
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-pruner
  namespace: ocidex-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-pruner
subjects:
  - kind: ServiceAccount
    name: tekton-pruner
    namespace: tekton-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-pruner
  namespace: apko-cicd-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-pruner
subjects:
  - kind: ServiceAccount
    name: tekton-pruner
    namespace: tekton-pipelines
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tekton-pruner
  namespace: tekton-pipelines
spec:
  schedule: "17 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: tekton-pruner
          restartPolicy: Never
          containers:
            - name: prune
              image: bitnami/kubectl:1.34
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  KEEP=10
                  for ns in ocidex-ci apko-cicd-ci; do
                    echo "Pruning completed PipelineRuns in $ns, keeping last $KEEP"
                    # Only completed runs (status.completionTime set) are candidates,
                    # so in-flight PipelineRuns are never touched.
                    kubectl get pipelinerun -n "$ns" \
                        -o jsonpath='{range .items[?(@.status.completionTime)]}{.status.completionTime}{"\t"}{.metadata.name}{"\n"}{end}' \
                      | sort \
                      | cut -f2 \
                      | head -n -"$KEEP" \
                      | xargs -r kubectl delete pipelinerun -n "$ns"
                  done
