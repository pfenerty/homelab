apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      version: "1.10.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h
  targetNamespace: monitoring
  values:
    alloy:
      configMap:
        content: |
          // Discover all pod log files on the local node.
          // local.file_match only sees files on the host filesystem via the /var/log
          // hostPath mount, so no explicit node filter is needed — each DaemonSet
          // instance is naturally scoped to its own node.
          local.file_match "pod_logs" {
            path_targets = [{"__path__" = "/var/log/pods/*/*/*.log"}]
          }

          loki.source.file "pod_logs" {
            targets    = local.file_match.pod_logs.targets
            forward_to = [loki.process.k8s_labels.receiver]
          }

          // Parse namespace, pod, and container from the file path.
          // Path format: /var/log/pods/{namespace}_{pod-name}_{uid}/{container}/{logfile}
          loki.process "k8s_labels" {
            forward_to = [loki.write.default.receiver]

            stage.regex {
              expression = `/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/`
              source     = "filename"
            }

            stage.labels {
              values = {
                namespace = "",
                pod       = "",
                container = "",
              }
            }
          }

          loki.write "default" {
            endpoint {
              url = "http://monitoring-loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
            }
          }
      securityContext:
        runAsUser: 0
      mounts:
        varlog: true
        dockercontainers: true
    controller:
      type: daemonset
      tolerations:
        - operator: Exists
          effect: NoSchedule
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
