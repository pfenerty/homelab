apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cnpg-operator
  namespace: monitoring
  labels:
    app.kubernetes.io/name: cloudnative-pg
spec:
  namespaceSelector:
    matchNames: [cnpg-system]
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
