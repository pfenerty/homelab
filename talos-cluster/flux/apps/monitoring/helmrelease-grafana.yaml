apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: "8.15.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h
  targetNamespace: monitoring
  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      storageClassName: nfs-client
      size: 2Gi
      accessModes: [ReadWriteOnce]
    # NFS root_squash prevents the init container from running chown
    initChownData:
      enabled: false
    admin:
      existingSecret: grafana-admin-secret
      userKey: admin-user
      passwordKey: admin-password
    # Sidecar watches for ConfigMaps labeled grafana_dashboard=1 and loads them
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: monitoring
        label: grafana_dashboard
        labelValue: "1"
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: true
      datasources:
        enabled: false
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://kps-prometheus.monitoring.svc.cluster.local:9090
            isDefault: true
            access: proxy
          - name: Loki
            type: loki
            url: http://monitoring-loki.monitoring.svc.cluster.local:3100
            access: proxy
    # download-dashboards init container fetches these from grafana.com and writes
    # them to /var/lib/grafana/dashboards/default/ on the PVC. dashboardProviders
    # below tells Grafana to load from that path (separate from the sidecar's
    # /tmp/dashboards which handles the kube-prometheus-stack ConfigMaps).
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: Apps
            type: file
            disableDeletion: false
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default:
        cnpg:
          gnetId: 20417
          revision: 1
          datasource: Prometheus
        keda:
          gnetId: 21252
          revision: 1
          datasource: Prometheus
        loki-operational:
          gnetId: 13407
          revision: 1
          datasource: Prometheus
        k8s-views-global:
          gnetId: 15757
          revision: 37
          datasource: Prometheus
        flux-control-plane:
          gnetId: 16715
          revision: 2
          datasource: Prometheus
