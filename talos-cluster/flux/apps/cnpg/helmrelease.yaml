apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.3"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
      interval: 12h
  targetNamespace: cnpg-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Operator runs comfortably on the x86 worker. Resource bumps are modest.
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # Default cluster wide monitoring exporter image (Prometheus scrape).
    monitoring:
      podMonitorEnabled: false
