apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  # URL is the OCI namespace, not the full chart path. Flux concatenates
  # the chart name (cloudnative-pg, from the HelmRelease's chart.spec.chart)
  # at pull time, yielding oci://ghcr.io/cloudnative-pg/charts/cloudnative-pg.
  # Including the chart name in the URL here doubles it.
  url: oci://ghcr.io/cloudnative-pg/charts
