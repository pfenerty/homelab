apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: apko-cicd-ci
    namespace: flux-system
spec:
    dependsOn:
        - name: tekton
        - name: pipelines-as-code
    interval: 10m0s
    path: ./talos-cluster/flux/apps/apko-cicd
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
