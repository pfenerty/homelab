apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: podinfo
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
        - name: cloudflare-gateway
    interval: 10m0s
    path: ./talos-cluster/flux/apps/podinfo
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
