apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: zot
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
        - name: nfs-subdir-provisioner
        - name: cloudflare-gateway
    interval: 10m0s
    path: ./talos-cluster/flux/apps/zot
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
