apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: renovate
    namespace: flux-system
spec:
    interval: 10m
    path: ./talos-cluster/flux/apps/renovate
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
