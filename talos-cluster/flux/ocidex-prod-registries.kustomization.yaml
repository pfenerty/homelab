apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: ocidex-prod-registries
    namespace: flux-system
spec:
    dependsOn:
        - name: ocidex-prod-operator
    interval: 10m0s
    path: ./talos-cluster/flux/apps/ocidex/prod/registries
