apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: ocidex-dev
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
        - name: cloudflare-gateway
        - name: cnpg
        - name: ocidex
    interval: 5m0s
    path: ./talos-cluster/flux/apps/ocidex/dev
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
