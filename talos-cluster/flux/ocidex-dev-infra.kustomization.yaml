apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: ocidex-dev-infra
    namespace: flux-system
spec:
    dependsOn:
        - name: cnpg
    interval: 5m0s
    path: ./talos-cluster/flux/apps/ocidex/dev/infra
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
