apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: cilium
    namespace: flux-system
spec:
    interval: 10m0s
    path: ./talos-cluster/flux/apps
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
    healthChecks:
        - apiVersion: apps/v1
          kind: Deployment
          name: cilium-operator
          namespace: kube-system
        - apiVersion: apps/v1
          kind: Deployment
          name: hubble-relay
          namespace: kube-system
        - apiVersion: apps/v1
          kind: DaemonSet
          name: cilium
          namespace: kube-system
        - apiVersion: apps/v1
          kind: DaemonSet
          name: cilium-envoy
          namespace: kube-system
