apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: ocidex-ci
    namespace: flux-system
spec:
    dependsOn:
        - name: tekton
    interval: 10m0s
    path: ./talos-cluster/flux/apps/ocidex-ci
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
