apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: tekton-chains
    namespace: flux-system
spec:
    dependsOn:
        - name: tekton
    interval: 10m0s
    path: ./talos-cluster/flux/apps/tekton-chains
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    # The cosign signing keypair (`signing-secrets` in tekton-chains) is created
    # out of band — see the app README. If you instead commit a SOPS-encrypted
    # `*.secret.yaml` into the app dir, add a `decryption: { provider: sops,
    # secretRef: { name: sops-age } }` block here (as pac.kustomization.yaml does).
    healthChecks:
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-chains-controller
          namespace: tekton-chains
