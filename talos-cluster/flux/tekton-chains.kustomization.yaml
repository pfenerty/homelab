apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: tekton-chains
    namespace: flux-system
spec:
    dependsOn:
        - name: tekton
    interval: 10m0s
    path: ./talos-cluster/flux/apps/tekton-chains
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    # Decrypt the SOPS-encrypted signing-secrets (cosign keypair) before applying.
    decryption:
        provider: sops
        secretRef:
            name: sops-age
    healthChecks:
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-chains-controller
          namespace: tekton-chains
