apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: ocidex
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
        - name: cloudflare-gateway
        - name: cnpg
        - name: keda
    interval: 10m0s
    path: ./talos-cluster/flux/apps/ocidex
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
