apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: ocidex
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
        - name: cloudflare-gateway
    interval: 10m0s
    path: ./k8s/overlays/prod
    prune: true
    targetNamespace: ocidex
    sourceRef:
        kind: GitRepository
        name: ocidex-prod
    decryption:
        provider: sops
        secretRef:
            name: sops-age
